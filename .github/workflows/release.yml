name: Release
on:
  push:
    tags: ['v*']
jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25-ea'
          distribution: 'temurin'
      - name: Build fat JAR
        run: mvn clean package -DskipTests
      - name: Stage artifacts
        # sing-box is already baked into the shaded JAR by
        # scripts/bundle-singbox.sh during `mvn package` — no separate
        # download needed. Copy just the shaded jar (not the
        # `original-*.jar` the shade plugin leaves alongside it).
        run: |
          mkdir -p staging
          cp target/vless-client-0.1.0-SNAPSHOT.jar staging/
      - name: Create DMG with jpackage
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          jpackage \
            --type dmg \
            --name "VLESS Client" \
            --app-version "${VERSION}" \
            --input staging \
            --main-jar vless-client-0.1.0-SNAPSHOT.jar \
            --main-class com.vlessclient.app.Launcher \
            --icon src/main/resources/icons/app-icon.icns \
            --dest dist \
            --mac-package-name "VLESSClient" \
            --java-options "--enable-preview" \
            --verbose
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
