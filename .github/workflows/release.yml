name: Release
on:
  push:
    tags: ['v*']
jobs:
  release-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    # Secrets are surfaced as job env because the `secrets` context is not
    # allowed in step `if:` conditions — the steps gate on env instead. Each
    # is empty until the secret exists (docs/SIGNING.md), so an unsigned
    # release builds byte-for-byte as before.
    env:
      MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      MACOS_NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
      MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
      MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25-ea'
          distribution: 'temurin'
      - name: Build fat JAR
        run: mvn clean package -DskipTests
      - name: Smoke-test the bundled sing-box
        # The DMG must never ship a core the generator can't drive: run the
        # real-binary smoke suite (version match, `sing-box check` on every
        # config shape, live run with clash_api + http-inbound probes).
        run: mvn test -Psmoke -Dtest=SingBoxRealBinarySmokeTest
      # --- Optional code signing (dormant until the secrets exist). ---
      - name: Import Developer ID certificate
        if: ${{ env.MACOS_CERTIFICATE_P12_BASE64 != '' }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KPW="$(openssl rand -hex 20)"
          security create-keychain -p "$KPW" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KPW" "$KEYCHAIN"
          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KPW" "$KEYCHAIN" >/dev/null
          # Add the signing keychain to the user search list (word-split of the
          # existing list is intentional).
          # shellcheck disable=SC2046
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | tr -d '"')
          echo "MACOS_SIGN_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
      - name: Create DMG with jpackage
        # Staging + jpackage live in scripts/package-dmg.sh, shared with the
        # per-merge build in build.yml. sing-box is already baked into the
        # shaded JAR by scripts/bundle-singbox.sh during `mvn package`.
        # MACOS_SIGN_IDENTITY (job env) is empty without the secret → unsigned.
        run: scripts/package-dmg.sh "${GITHUB_REF_NAME#v}"
      - name: Notarize and staple the DMG
        if: ${{ env.MACOS_NOTARY_KEY_BASE64 != '' }}
        run: |
          echo "$MACOS_NOTARY_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          xcrun notarytool submit dist/*.dmg \
            --key "$RUNNER_TEMP/notary.p8" --key-id "$MACOS_NOTARY_KEY_ID" \
            --issuer "$MACOS_NOTARY_ISSUER_ID" --wait
          xcrun stapler staple dist/*.dmg
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg

  # Windows twin of the job above: same gates (fat JAR, real-binary smoke),
  # same shared packaging script as the per-merge build, MSI instead of DMG.
  # Both jobs upload to the same tag's release; action-gh-release appends.
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    # Secrets via job env — the `secrets` context can't be used in step `if:`.
    # Empty until the secret exists; the MSI is then unsigned as before.
    env:
      WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
      WINDOWS_SIGN_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25-ea'
          distribution: 'temurin'
      - name: Build fat JAR
        run: mvn -B clean package -DskipTests
      - name: Smoke-test the bundled sing-box
        # The MSI must never ship a core the generator can't drive: the same
        # real-binary smoke suite as macOS, running the bundled sing-box.exe.
        run: mvn -B test -Psmoke "-Dtest=SingBoxRealBinarySmokeTest"
      # Optional: materialize the signing cert from a secret; package-windows.ps1
      # signs the MSI only when WINDOWS_SIGN_PFX is set. No-op otherwise.
      - name: Prepare code-signing certificate
        if: ${{ env.WINDOWS_CERTIFICATE_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP 'sign.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX_BASE64))
          "WINDOWS_SIGN_PFX=$pfx" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
      - name: Create MSI with jpackage
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/package-windows.ps1 -Version "$($env:GITHUB_REF_NAME -replace '^v', '')"
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.msi

  # Linux twin: same gates (fat JAR, real-binary smoke), same shared
  # packaging script as the per-merge build, DEB instead of DMG/MSI.
  release-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25-ea'
          distribution: 'temurin'
      - name: Build fat JAR
        run: mvn -B clean package -DskipTests
      - name: Smoke-test the bundled sing-box
        # The DEB must never ship a core the generator can't drive: the same
        # real-binary smoke suite as the other platforms.
        run: mvn -B test -Psmoke -Dtest=SingBoxRealBinarySmokeTest
      - name: Create DEB with jpackage
        run: scripts/package-linux.sh "${GITHUB_REF_NAME#v}"
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb

  # arm64 twin of release-linux on GitHub's free arm runners: same gates
  # (fat JAR, real-binary smoke on the linux-arm64 core), same script —
  # jpackage derives the deb architecture from the host.
  release-linux-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25-ea'
          distribution: 'temurin'
      - name: Build fat JAR
        run: mvn -B clean package -DskipTests
      - name: Smoke-test the bundled sing-box
        run: mvn -B test -Psmoke -Dtest=SingBoxRealBinarySmokeTest
      - name: Create DEB with jpackage
        run: scripts/package-linux.sh "${GITHUB_REF_NAME#v}"
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb

  # Fill the Homebrew cask and AUR PKGBUILD templates with this release's
  # version and asset checksums, and attach the ready-to-use files to the
  # release. A tap/AUR maintainer copies them into their package repo (see
  # docs/DISTRIBUTION.md); the repo keeps the templates unfilled.
  update-packaging:
    needs: [release-macos, release-windows, release-linux, release-linux-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate cask + PKGBUILD with release checksums
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          V="${GITHUB_REF_NAME#v}"
          sha_of() {
            gh release download "$GITHUB_REF_NAME" -p "$1" -O "$RUNNER_TEMP/$1" --clobber
            sha256sum "$RUNNER_TEMP/$1" | awk '{print $1}'
          }
          DMG=$(sha_of "vless-client_${V}.dmg")
          DEB_AMD64=$(sha_of "vless-client_${V}_amd64.deb")
          DEB_ARM64=$(sha_of "vless-client_${V}_arm64.deb")
          scripts/update-packaging.sh "$V" "$DMG" "$DEB_AMD64" "$DEB_ARM64"
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            packaging/homebrew/vless-client.rb
            packaging/aur/PKGBUILD
            packaging/aur/.SRCINFO

  # Keep the Releases page tidy: once all three installers are attached, delete
  # every real release older than the 5 newest. The rolling dev-latest
  # prerelease and any draft are never counted or touched. Git tags are kept
  # (no --cleanup-tag), so version history stays intact and any pruned build
  # can be rebuilt from its tag — only the Releases-page entry and its uploaded
  # installers go. Runs after the three release jobs so it never races the
  # upload of the release it's pruning around.
  prune-old-releases:
    needs: [release-macos, release-windows, release-linux, release-linux-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete real releases older than the newest 5
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          stale=$(gh release list --json tagName,isPrerelease,isDraft,createdAt \
            --jq 'map(select((.isPrerelease or .isDraft) | not))
                  | sort_by(.createdAt) | reverse | .[5:][].tagName')
          if [ -z "$stale" ]; then
            echo "5 or fewer real releases — nothing to prune."
            exit 0
          fi
          echo "Pruning releases older than the newest 5 (tags kept):"
          echo "$stale"
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            gh release delete "$tag" --yes && echo "deleted release $tag" \
              || echo "::warning::could not delete release $tag (will retry next release)"
          done <<< "$stale"
