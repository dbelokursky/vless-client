name: Release
on:
  push:
    tags: ['v*']
jobs:
  release-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25-ea'
          distribution: 'temurin'
      - name: Build fat JAR
        run: mvn clean package -DskipTests
      - name: Smoke-test the bundled sing-box
        # The DMG must never ship a core the generator can't drive: run the
        # real-binary smoke suite (version match, `sing-box check` on every
        # config shape, live run with clash_api + http-inbound probes).
        run: mvn test -Psmoke -Dtest=SingBoxRealBinarySmokeTest
      - name: Create DMG with jpackage
        # Staging + jpackage live in scripts/package-dmg.sh, shared with the
        # per-merge build in build.yml. sing-box is already baked into the
        # shaded JAR by scripts/bundle-singbox.sh during `mvn package`.
        run: scripts/package-dmg.sh "${GITHUB_REF_NAME#v}"
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg

  # Windows twin of the job above: same gates (fat JAR, real-binary smoke),
  # same shared packaging script as the per-merge build, MSI instead of DMG.
  # Both jobs upload to the same tag's release; action-gh-release appends.
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25-ea'
          distribution: 'temurin'
      - name: Build fat JAR
        run: mvn -B clean package -DskipTests
      - name: Smoke-test the bundled sing-box
        # The MSI must never ship a core the generator can't drive: the same
        # real-binary smoke suite as macOS, running the bundled sing-box.exe.
        run: mvn -B test -Psmoke "-Dtest=SingBoxRealBinarySmokeTest"
      - name: Create MSI with jpackage
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/package-windows.ps1 -Version "$($env:GITHUB_REF_NAME -replace '^v', '')"
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.msi

  # Linux twin: same gates (fat JAR, real-binary smoke), same shared
  # packaging script as the per-merge build, DEB instead of DMG/MSI.
  release-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25-ea'
          distribution: 'temurin'
      - name: Build fat JAR
        run: mvn -B clean package -DskipTests
      - name: Smoke-test the bundled sing-box
        # The DEB must never ship a core the generator can't drive: the same
        # real-binary smoke suite as the other platforms.
        run: mvn -B test -Psmoke -Dtest=SingBoxRealBinarySmokeTest
      - name: Create DEB with jpackage
        run: scripts/package-linux.sh "${GITHUB_REF_NAME#v}"
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb

  # Keep the Releases page tidy: once all three installers are attached, delete
  # every real release older than the 5 newest. The rolling dev-latest
  # prerelease and any draft are never counted or touched. Git tags are kept
  # (no --cleanup-tag), so version history stays intact and any pruned build
  # can be rebuilt from its tag — only the Releases-page entry and its uploaded
  # installers go. Runs after the three release jobs so it never races the
  # upload of the release it's pruning around.
  prune-old-releases:
    needs: [release-macos, release-windows, release-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete real releases older than the newest 5
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          stale=$(gh release list --json tagName,isPrerelease,isDraft,createdAt \
            --jq 'map(select((.isPrerelease or .isDraft) | not))
                  | sort_by(.createdAt) | reverse | .[5:][].tagName')
          if [ -z "$stale" ]; then
            echo "5 or fewer real releases — nothing to prune."
            exit 0
          fi
          echo "Pruning releases older than the newest 5 (tags kept):"
          echo "$stale"
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            gh release delete "$tag" --yes && echo "deleted release $tag" \
              || echo "::warning::could not delete release $tag (will retry next release)"
          done <<< "$stale"
