name: Release
on:
  push:
    tags: ['v*']
jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25-ea'
          distribution: 'temurin'
      - name: Build fat JAR
        run: mvn clean package -DskipTests
      - name: Smoke-test the bundled sing-box
        # The DMG must never ship a core the generator can't drive: run the
        # real-binary smoke suite (version match, `sing-box check` on every
        # config shape, live run with clash_api + http-inbound probes).
        run: mvn test -Psmoke -Dtest=SingBoxRealBinarySmokeTest
      - name: Create DMG with jpackage
        # Staging + jpackage live in scripts/package-dmg.sh, shared with the
        # per-merge build in build.yml. sing-box is already baked into the
        # shaded JAR by scripts/bundle-singbox.sh during `mvn package`.
        run: scripts/package-dmg.sh "${GITHUB_REF_NAME#v}"
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
