name: Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25-ea'
          distribution: 'temurin'
      # -Psmoke additionally runs SingBoxRealBinarySmokeTest against the
      # real bundled sing-box: version match, `sing-box check` over every
      # generated config shape, and a live run probing clash_api + the http
      # inbound. Catches generator/core schema drift before merge.
      - run: mvn clean verify -Psmoke
