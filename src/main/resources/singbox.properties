# Single source of truth for the pinned sing-box release.
#
# Consumed by three build/runtime layers so the values can never drift apart:
#   - pom.xml           (properties-maven-plugin, initialize phase)
#   - scripts/bundle-singbox.sh / .ps1 (build-time bundling + checksum verify)
#   - SingBoxInstaller  (classpath resource, runtime fallback download)
#
# One checksum per bundled asset: a darwin tar.gz per arch, the windows amd64
# zip and the linux amd64 tar.gz. The build host's OS decides which one gets
# verified & bundled.
#
# To bump: run scripts/bump-singbox.sh <version> && mvn clean verify -Psmoke
singbox.version=1.13.14
