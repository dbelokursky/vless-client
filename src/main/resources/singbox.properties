singbox.sha256.windows-amd64=f580782c6dd10f7691c66cea1d7c421813c5fbf7e305d1ee7ce0c3a40d196341
singbox.sha256.linux-amd64=f48703461a15476951ac4967cdad339d986f4b8096b4eb3ff0829a500502d697
